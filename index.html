<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Project</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <h1>Rock Paper Scissor Game</h1>
    <div class="choices">
        <div class="choice" id="Rock">
            <img src="Rock.jpeg" alt="This is rock image">
       </div>
        <div class="choice" id="paper">
            <img src="paper.png" alt="This is paper image">
       </div>
       <div class="choice" id="scissor">
            <img src="scissor.png" alt="This is scissor image">
        </div>
    </div>

    <div class="score-bored">
        <div class="score">
            <p id="user-score">0</p>
            <p>you</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <!-- <div class="abovescore">
        <p id="abv">you are on lead</p>
    </div> -->
    <script src="game.js"></script>
</body>
</html>
